name: Veracode Build Dart Code Package

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      ref:
        required: true
        type: string
      token:
        required: true
        type: string
      default_runs_on:
        required: true
        type: string

jobs:
  build:
    runs-on: ${{ fromJSON(inputs.default_runs_on) }}
    steps:
    - uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        token: ${{ inputs.token }}

    - name: Set up JDK 1.8
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      run: |
        ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools
    
        # Download command line tools
        curl -o sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip sdk.zip
        rm sdk.zip
    
        mv cmdline-tools latest
    
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
    
    - name: Setup Android SDK
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

    - name: Install Flutter manually
      run: |
        git clone https://github.com/flutter/flutter.git -b stable
        echo "$PWD/flutter/bin" >> $GITHUB_PATH

    - run: flutter doctor

    - name: Build all Flutter apps
      run: |
        find . -name "pubspec.yaml" | while read file; do
          dir=$(dirname "$file")
    
          if grep -q "flutter:" "$file"; then
            echo "Building Flutter app in $dir"
            (cd "$dir" && flutter pub get && flutter build apk --debug)
          fi
        done

    - uses: actions/upload-artifact@v4
      with:
        name: veracode-artifacts
        path: |
          **/build/app/outputs/flutter-apk/*.apk
